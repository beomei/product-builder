<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Look Alike Test</title>
    <meta name="google-adsense-account" content="ca-pub-5884634026224217">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5884634026224217"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <!-- TensorFlow and Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn">🌙</button>
        </div>
        
        <header class="main-header">
            <h1>Animal Look Alike Test</h1>
            <p>Are you a Dog person or a Cat person?</p>
        </header>

        <section class="animal-test-section">
            <div class="upload-container">
                <input type="file" id="image-upload" accept="image/*" hidden>
                <label for="image-upload" class="upload-label">
                    <div id="image-preview-container">
                        <img id="image-preview" src="" alt="Upload your photo" style="display: none;">
                        <div id="upload-placeholder">
                            <span class="upload-icon">📷</span>
                            <span>Click to upload or drag & drop</span>
                        </div>
                    </div>
                </label>
            </div>
            <div id="label-container"></div>
            <div id="loading-spinner" style="display: none;">Analyzing...</div>
        </section>

        <hr class="divider">

        <section class="lotto-section">
            <h2>Lotto Number Generator</h2>
            <div id="lotto-numbers" class="lotto-numbers-container"></div>
            <button id="generate-btn" class="secondary-btn">Generate Numbers</button>
        </section>

        <hr class="divider">

        <div class="contact-section">
            <h2>Affiliate Inquiry</h2>
            <form action="https://formspree.io/f/xaqpjkkd" method="POST" class="contact-form">
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" placeholder="Inquiry Message" required></textarea>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </div>

        <hr class="divider">

        <div class="comments-section">
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://product-builder-4.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>

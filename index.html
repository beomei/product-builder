<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn">🌙</button>
        </div>
        <h1>Lotto Number Generator</h1>
        <div id="lotto-numbers" class="lotto-numbers-container"></div>
        <button id="generate-btn">Generate Numbers</button>

        <hr class="divider">

        <div class="contact-section">
            <h2>Affiliate Inquiry</h2>
            <form action="https://formspree.io/f/xaqpjkkd" method="POST" class="contact-form">
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" placeholder="Inquiry Message" required></textarea>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
